<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openagent-go team chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;background:#0d1117;color:#c9d1d9;display:flex;height:100vh}
#sidebar{width:260px;min-width:200px;background:#010409;border-right:1px solid #21262d;display:flex;flex-direction:column;overflow:hidden}
#sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#484f58;padding:16px 14px 8px}
#slist{flex:1;overflow-y:auto;padding:0 8px}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s}
.sitem:hover{background:#161b22}
.sitem.active{background:#1f6feb;color:#fff}
.sitem .info{flex:1;min-width:0;overflow:hidden}
.sitem .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem .meta{font-size:11px;color:#484f58;margin-top:1px}
.sitem.active .meta{color:rgba(255,255,255,.6)}
.sitem .del{visibility:hidden;background:none;border:none;color:#666;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.sitem:hover .del{visibility:visible}
.sitem .del:hover{color:#f85149}
#side-btns{padding:8px;border-top:1px solid #21262d}
#side-btns button{width:100%;padding:8px;border-radius:6px;border:1px solid #30363d;background:transparent;color:#8b949e;cursor:pointer;font-size:13px}
#side-btns button:hover{background:#161b22;color:#c9d1d9}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{padding:8px 14px;border-radius:8px;white-space:pre-wrap;word-break:break-word}
.user{align-self:flex-end;background:#1f6feb;color:#fff;max-width:80%}
.agent-header{align-self:flex-start;font-size:13px;color:#58a6ff;font-weight:bold;padding:4px 0}
.agent-text{align-self:flex-start;background:#161b22;border:1px solid #30363d;max-width:85%}
.handoff{align-self:center;font-size:12px;color:#8b949e;background:#21262d;padding:4px 12px;border-radius:12px}
.tool{align-self:flex-start;background:#1a1a2e;color:#7b93ff;font-size:12px;border-radius:8px;padding:6px 12px;max-width:85%}
.tool-result{color:#8b949e;font-size:12px;padding:2px 14px}
.error{color:#f85149;font-size:13px;align-self:flex-start}
.agent-end{color:#484f58;font-size:11px;align-self:flex-start;border-bottom:1px solid #21262d;padding-bottom:4px;margin-bottom:4px;width:100%}
.approval-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10}
.approval-box{background:#161b22;border:1px solid #30363d;border-radius:12px;padding:24px 32px;min-width:380px;text-align:center}
.approval-box h3{margin-bottom:4px;color:#d2991d}
.approval-box .agent-label{font-size:12px;color:#8b949e;margin-bottom:8px}
.approval-box pre{background:#0d1117;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:12px;text-align:left;max-height:120px;overflow-y:auto}
.approval-box .btns{display:flex;gap:12px;justify-content:center;margin-top:16px}
.approval-box button{padding:8px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
.btn-y{background:#238636;color:#fff}
.btn-n{background:#da3633;color:#fff}
#input-box{display:flex;padding:12px 16px;border-top:1px solid #21262d;background:#0d1117}
#input-box textarea{flex:1;background:#161b22;border:1px solid #30363d;border-radius:8px;color:#c9d1d9;padding:10px;resize:none;font:inherit;height:44px;outline:none}
#input-box textarea:focus{border-color:#1f6feb}
#input-box button{background:#1f6feb;color:#fff;border:none;border-radius:8px;padding:0 20px;margin-left:8px;cursor:pointer;font-size:14px}
#input-box button:disabled{opacity:.4;cursor:default}
.empty-state{color:#484f58;text-align:center;padding:40px 20px;font-size:13px}
#usage-bar{display:none;align-items:center;gap:10px;padding:6px 16px;font-size:12px;color:#c9d1d9;background:#161b22;border-top:1px solid #21262d}
#usage-bar.visible{display:flex}
#usage-bar .usage-pct{font-weight:600;color:#58a6ff;min-width:42px}
#usage-bar .usage-outer{flex:1;max-width:200px;height:6px;background:#21262d;border-radius:3px;overflow:hidden}
#usage-bar .usage-inner{height:100%;background:linear-gradient(90deg,#58a6ff,#3fb950);border-radius:3px;transition:width .4s ease}
#usage-bar .usage-info{font-size:11px;color:#8b949e;margin-left:auto}
</style>
</head>
<body>
<div id="sidebar">
  <h2>Team Sessions</h2>
  <div id="slist"></div>
  <div id="side-btns">
    <button onclick="newSession()">+ New Session</button>
  </div>
</div>
<div id="main">
  <div id="msgs"><div class="empty-state">Select or create a session to start chatting</div></div>
  <div id="usage-bar"><span class="usage-pct"></span><span class="usage-outer"><span class="usage-inner"></span></span><span class="usage-info"></span></div>
  <div id="input-box">
    <textarea id="input" placeholder="Try: What's 15 * 23 + 100 / 4?" rows="1" autofocus disabled></textarea>
    <button id="send" onclick="send()" disabled>Send</button>
  </div>
</div>

<script>
let sid = null, es = null, running = false;
let sessions = [];

async function loadSessions() {
  const res = await fetch('/team/sessions');
  sessions = await res.json();
  renderSessions();
  if (!sid && sessions.length > 0) selectSession(sessions[0].id);
}

function renderSessions() {
  const sl = document.getElementById('slist');
  sl.innerHTML = '';
  if (sessions.length === 0) {
    sl.innerHTML = '<div class="empty-state">No sessions yet</div>';
    return;
  }
  sessions.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sitem' + (s.id === sid ? ' active' : '');
    el.innerHTML = `<div class="info">
      <div class="title">${esc(s.title || 'Untitled')}</div>
      <div class="meta">${fmtTime(s.updatedAt)}</div>
    </div>
    <button class="del" title="Delete session">&times;</button>`;
    el.querySelector('.info').onclick = () => selectSession(s.id);
    el.querySelector('.title').ondblclick = (e) => { e.stopPropagation(); editTitle(s.id, el.querySelector('.title')); };
    el.querySelector('.del').onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
    sl.appendChild(el);
  });
}

async function newSession() {
  const res = await fetch('/team/sessions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title: ''})
  });
  const info = await res.json();
  sessions.push(info);
  renderSessions();
  selectSession(info.id);
}

async function selectSession(id) {
  if (sid === id) return;
  if (es) { es.close(); es = null; }
  sid = id;
  document.getElementById('msgs').innerHTML = '';
  running = false;
  document.getElementById('send').disabled = false;
  document.getElementById('input').disabled = false;
  document.getElementById('input').focus();
  renderSessions();
  connect();
}

async function deleteSession(id) {
  if (!confirm('Delete this session? All messages will be lost.')) return;
  await fetch('/team/sessions?id=' + encodeURIComponent(id), {method: 'DELETE'});
  sessions = sessions.filter(s => s.id !== id);
  if (sid === id) {
    sid = null; es?.close(); es = null;
    document.getElementById('msgs').innerHTML = '<div class="empty-state">Select or create a session to start chatting</div>';
    document.getElementById('send').disabled = true;
    document.getElementById('input').disabled = true;
    running = false;
  }
  renderSessions();
}

async function editTitle(id, titleEl) {
  const orig = titleEl.textContent;
  const inp = document.createElement('input');
  inp.value = orig === 'Untitled' ? '' : orig;
  inp.style.cssText = 'background:#161b22;border:1px solid #1f6feb;color:#c9d1d9;padding:2px 6px;border-radius:4px;font-size:13px;width:100%';
  titleEl.replaceWith(inp);
  inp.focus(); inp.select();
  inp.onblur = () => saveTitle(id, inp.value || 'Untitled', inp);
  inp.onkeydown = e => { if (e.key === 'Enter') saveTitle(id, inp.value || 'Untitled', inp); };
}

async function saveTitle(id, title, inp) {
  const el = document.createElement('div');
  el.className = 'title';
  el.textContent = title || 'Untitled';
  el.ondblclick = (e) => { e.stopPropagation(); editTitle(id, el); };
  inp.replaceWith(el);
  await fetch('/team/sessions?id=' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title})
  });
  const s = sessions.find(s => s.id === id);
  if (s) s.title = title;
}

// ── EventSource ──
function connect() {
  if (!sid) return;
  es = new EventSource('/team/events?session=' + sid);
  es.onmessage = e => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'user_message':
        append('user', msg.text);
        scrollDown();
        break;
      case 'agent_start':
        append('agent-header', '▸ ' + msg.agent);
        break;
      case 'text_delta': {
        let last = document.getElementById('msgs').lastElementChild;
        let agent = msg.agent || 'agent';
        if (!last || !last.classList.contains('agent-text') || last.dataset.agent !== agent) {
          last = append('agent-text', '');
          last.dataset.agent = agent;
        }
        last.textContent += msg.text;
        scrollDown();
        break;
      }
      case 'tool_call':
        append('tool', '🔧 ' + msg.agent + ' → ' + msg.tool_call.function.name);
        break;
      case 'tool_result':
        append('agent-text', '  ← ' + msg.text);
        break;
      case 'tool_approval':
        showApproval(msg);
        break;
      case 'tool_approval_cancelled':
        dismissApproval();
        break;
      case 'agent_end':
        if (msg.error) append('error', '✖ ' + msg.agent + ': ' + msg.error);
        break;
      case 'handoff':
        append('handoff', '↪ ' + msg.agent + ' → ' + (msg.handoff_to || '?'));
        break;
      case 'done':
        running = false;
        document.getElementById('send').disabled = false;
        if (msg.context_window) {
          var tokens = msg.prompt_tokens || 0;
          var pct = (tokens / msg.context_window * 100).toFixed(1);
          var ub = document.getElementById('usage-bar');
          ub.classList.add('visible');
          ub.querySelector('.usage-pct').textContent = pct + '%';
          ub.querySelector('.usage-inner').style.width = Math.min(pct, 100) + '%';
          ub.querySelector('.usage-info').textContent = tokens.toLocaleString() + ' / ' + (msg.context_window/1000).toFixed(0) + 'K tokens';
        }
        break;
      case 'error':
        append('error', '✖ ' + msg.text);
        running = false;
        document.getElementById('send').disabled = false;
        break;
      case 'session_deleted':
        sessions = sessions.filter(s => s.id !== sid);
        sid = null; es?.close(); es = null;
        document.getElementById('msgs').innerHTML = '<div class="empty-state">This session was deleted</div>';
        document.getElementById('send').disabled = true;
        document.getElementById('input').disabled = true;
        running = false;
        renderSessions();
        return;
    }
  };
  es.onerror = () => { es.close(); setTimeout(connect, 2000); };
}

// ── Messages ──
function append(cls, text) {
  const el = document.createElement('div');
  el.className = 'msg ' + cls;
  el.textContent = text;
  document.getElementById('msgs').appendChild(el);
  return el;
}

function scrollDown() {
  document.getElementById('msgs').scrollTop = document.getElementById('msgs').scrollHeight;
}

// ── Send ──
async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text || running || !sid) return;
  input.value = '';
  running = true;
  document.getElementById('send').disabled = true;
  scrollDown();
  await fetch('/team/chat', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session: sid, message: text})
  });
}

// ── Approval ──
function showApproval(msg) {
  const ov = document.createElement('div');
  ov.className = 'approval-overlay';
  ov.innerHTML = `<div class="approval-box">
    <h3>Approve tool execution?</h3>
    <div class="agent-label">Agent: ${esc(msg.agent)}</div>
    <pre>${esc(msg.tool_call.function.name)}(${esc(msg.tool_call.function.arguments)})</pre>
    <div class="btns">
      <button class="btn-y" id="btn-y">✓ Approve</button>
      <button class="btn-n" id="btn-n">✗ Deny</button>
    </div>
  </div>`;
  document.body.appendChild(ov);
  document.getElementById('btn-y').onclick = () => decide(true, ov);
  document.getElementById('btn-n').onclick = () => decide(false, ov);
}

function dismissApproval() {
  const ov = document.querySelector('.approval-overlay');
  if (ov) ov.remove();
}

async function decide(allowed, ov) {
  ov.remove();
  await fetch('/team/approve', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({session: sid, allowed})
  });
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(t) {
  if (!t) return '';
  const d = new Date(t);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
});

loadSessions();
</script>
</body>
</html>
