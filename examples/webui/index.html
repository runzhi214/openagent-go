<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>openagent-go chat</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font:14px/1.6 -apple-system,BlinkMacSystemFont,sans-serif;background:#111;color:#ddd;display:flex;height:100vh}
#sidebar{width:260px;min-width:200px;background:#0a0a0a;border-right:1px solid #222;display:flex;flex-direction:column;overflow:hidden}
#sidebar h2{font-size:13px;text-transform:uppercase;letter-spacing:1px;color:#666;padding:16px 14px 8px}
#slist{flex:1;overflow-y:auto;padding:0 8px}
.sitem{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-radius:8px;cursor:pointer;margin-bottom:2px;transition:background .15s}
.sitem:hover{background:#1a1a1a}
.sitem.active{background:#1a56db;color:#fff}
.sitem .info{flex:1;min-width:0;overflow:hidden}
.sitem .title{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sitem .meta{font-size:11px;color:#666;margin-top:1px}
.sitem.active .meta{color:rgba(255,255,255,.6)}
.sitem .del{visibility:hidden;background:none;border:none;color:#888;cursor:pointer;font-size:16px;padding:0 4px;line-height:1}
.sitem:hover .del{visibility:visible}
.sitem .del:hover{color:#f44}
#side-btns{padding:8px;border-top:1px solid #1a1a1a}
#side-btns button{width:100%;padding:8px;border-radius:6px;border:1px solid #333;background:transparent;color:#888;cursor:pointer;font-size:13px}
#side-btns button:hover{background:#1a1a1a;color:#ddd}
#main{flex:1;display:flex;flex-direction:column;min-width:0}
#msgs{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;padding:10px 14px;border-radius:12px;white-space:pre-wrap;word-break:break-word}
.user{align-self:flex-end;background:#1a56db;color:#fff}
.agent{align-self:flex-start;background:#222;border:1px solid #333}
.tool{align-self:flex-start;background:#1a1a2e;color:#7b93ff;font-size:12px;border-radius:8px;padding:6px 12px}
.approval-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:10}
.approval-box{background:#1e1e2e;border:1px solid #444;border-radius:12px;padding:24px 32px;min-width:380px;text-align:center}
.approval-box h3{margin-bottom:12px;color:#fbbf24}
.approval-box pre{background:#111;padding:8px 12px;border-radius:6px;margin:8px 0;font-size:12px;text-align:left;max-height:120px;overflow-y:auto}
.approval-box .btns{display:flex;gap:12px;justify-content:center;margin-top:16px}
.approval-box button{padding:8px 24px;border-radius:8px;border:none;cursor:pointer;font-size:14px}
.btn-y{background:#16a34a;color:#fff}
.btn-dir{background:#1a56db;color:#fff}
.btn-n{background:#dc2626;color:#fff}
#input-box{display:flex;padding:12px 16px;border-top:1px solid #333;background:#181818}
#input-box textarea{flex:1;background:#222;border:1px solid #333;border-radius:8px;color:#ddd;padding:10px;resize:none;font:inherit;height:44px;outline:none}
#input-box textarea:focus{border-color:#1a56db}
#input-box button{background:#1a56db;color:#fff;border:none;border-radius:8px;padding:0 20px;margin-left:8px;cursor:pointer;font-size:14px}
#input-box button:disabled{opacity:.4;cursor:default}
.spin{display:inline-block;width:8px;height:8px;border-radius:50%;background:#666;animation:blink 1.4s infinite both;margin:0 2px}
.spin:nth-child(2){animation-delay:.2s}
.spin:nth-child(3){animation-delay:.4s}

/* ── Slash command picker ── */
#slash-pick{display:none;position:absolute;bottom:100%;left:0;right:0;margin-bottom:4px;background:#161b22;border:1px solid #30363d;border-radius:8px;overflow:hidden;z-index:5;max-height:200px;overflow-y:auto}
#slash-pick .sc-item{padding:8px 14px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
#slash-pick .sc-item:hover,.sc-item.sel{background:#1f6feb}
#slash-pick .sc-icon{font-size:18px;width:28px;text-align:center;flex-shrink:0}
#slash-pick .sc-name{font-size:13px;font-weight:600;color:#c9d1d9}
#slash-pick .sc-desc{font-size:11px;color:#8b949e;margin-left:auto}
#input-wrap{position:relative;flex:1;display:flex}
#input-wrap textarea{flex:1}
/* Pill inside textarea — shown as a ghost element */
.sc-pill{display:inline-block;background:#1f6feb22;color:#58a6ff;border-radius:4px;padding:0 4px;font-size:12px;font-weight:600;margin-right:2px;pointer-events:none}
@keyframes blink{0%{opacity:.2}20%{opacity:1}100%{opacity:.2}}
.empty-state{color:#555;text-align:center;padding:40px 20px;font-size:13px}

/* ── Plan DAG ── */
.plan-dag{background:#1a1a1a;border:1px solid #333;border-radius:12px;padding:12px;margin:4px 0;max-width:100%;overflow:auto}
.plan-dag-title{font-size:13px;color:#58a6ff;font-weight:600;margin-bottom:8px}
.dag-graph{position:relative;min-height:40px;overflow:visible}
.dag-svg{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0}
.dag-svg path{stroke:#30363d;stroke-width:1.5;fill:none}
.dag-columns{display:flex;gap:24px;position:relative;z-index:1;padding:2px 0}
.dag-col{display:flex;flex-direction:column;gap:8px;min-width:150px;justify-content:space-evenly}
.step-card{background:#111;border:2px solid #30363d;border-radius:8px;padding:8px 10px;position:relative;transition:border-color .3s;font-size:11px;cursor:pointer}
.step-card:hover{border-color:#58a6ff}
.step-card.running{border-color:#1f6feb;box-shadow:0 0 10px rgba(31,111,235,.3);animation:pulse 1.5s infinite}
.step-card.done{border-color:#238636}
.step-card.failed{border-color:#dc2626}
.step-card .si-id{font-size:9px;color:#555;text-transform:uppercase;letter-spacing:1px;margin-bottom:2px}
.step-card .si-agent{font-size:10px;color:#58a6ff;font-weight:600;margin-bottom:2px}
.step-card .si-task{font-size:11px;color:#c9d1d9;margin-bottom:2px;line-height:1.3}
.step-card .si-deps{font-size:9px;color:#555;margin-bottom:3px}
.step-card .si-status{font-size:9px;padding:1px 6px;border-radius:6px;display:inline-block}
.step-card .si-status.pending{background:#21262d;color:#8b949e}
.step-card .si-status.running{background:#1f6feb22;color:#58a6ff}
.step-card .si-status.done{background:#23863622;color:#3fb950}
.step-card .si-status.failed{background:#da363322;color:#f44}
.step-card .si-final{position:absolute;top:-6px;right:6px;background:#d2991d;color:#000;font-size:8px;padding:1px 5px;border-radius:4px;font-weight:600}
.step-card .si-output{font-size:10px;color:#8b949e;margin-top:4px;padding-top:4px;border-top:1px solid #21262d;max-height:50px;overflow-y:auto;display:none}
.step-card.done .si-output{display:block}
.plan-actions{display:flex;gap:6px;margin-top:8px}
.plan-actions button{padding:4px 14px;border-radius:6px;border:none;cursor:pointer;font-size:11px;font-weight:500}
.btn-pe{background:#238636;color:#fff}
.btn-pe:hover{background:#2ea043}
.btn-pc{background:#da3633;color:#fff}
.btn-pc:hover{background:#f85149}
.plan-progress{font-size:11px;color:#8b949e;padding:4px 0}
.plan-progress.done{color:#3fb950}
.plan-progress.failed{color:#f85149}

@keyframes pulse{0%,100%{box-shadow:0 0 10px rgba(31,111,235,.3)}50%{box-shadow:0 0 18px rgba(31,111,235,.6)}}

/* Step output popup */
.step-popup-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);display:flex;align-items:center;justify-content:center;z-index:20}
.step-popup{background:#161b22;border:1px solid #30363d;border-radius:12px;max-width:700px;max-height:80vh;width:90%;display:flex;flex-direction:column;overflow:hidden}
.step-popup-hd{display:flex;align-items:center;justify-content:space-between;padding:12px 16px;border-bottom:1px solid #21262d;font-size:13px;color:#58a6ff;font-weight:600}
.step-popup-st{font-size:10px;padding:1px 6px;border-radius:6px;margin-left:8px;background:#21262d;color:#8b949e}
.step-popup-x{background:none;border:none;color:#8b949e;cursor:pointer;font-size:18px;padding:0 4px;line-height:1}
.step-popup-x:hover{color:#f85149}
.step-popup-body{flex:1;overflow-y:auto;padding:16px;font-size:13px;line-height:1.6;white-space:pre-wrap;word-break:break-word;color:#c9d1d9}

/* ── Pipeline panel ── */
#pipeline-wrap{display:none;border-top:1px solid #1a1a2e;background:linear-gradient(180deg,#0a0a14,#0d0d1a);padding:6px 16px;overflow:hidden;transition:all .4s}
#pipeline-wrap.show{display:block}
#pipeline-svg{width:100%;height:86px;display:block}
.pnode-rect{transition:all .4s}
.pnode-rect.pending{opacity:.25}
.pnode-rect.active .pn-bg{stroke:#60a5fa;stroke-width:1.5;filter:url(#glow)}
.pnode-rect.done .pn-bg{fill:#0a2a12;stroke:#16a34a;stroke-width:1}
.pnode-rect.error .pn-bg{fill:#2a0a0a;stroke:#dc2626;stroke-width:1.5}
.pn-label{fill:#888;font-size:8px;text-anchor:middle;letter-spacing:.3px}
.pn-icon{font-size:14px;text-anchor:middle}
.pn-dur{fill:#555;font-size:8px;text-anchor:middle}
.pnode-rect.done .pn-dur{fill:#16a34a}
.pnode-rect.error .pn-dur{fill:#dc2626}
.pconn{stroke:#222;stroke-width:1.2;fill:none;transition:stroke .4s;stroke-linecap:round}
.pconn.flow{stroke:#1a56db;stroke-width:1.5;stroke-dasharray:6 4;animation:flowDash .3s linear infinite}
@keyframes flowDash{to{stroke-dashoffset:-10}}
.pinfo-text{fill:#555;font-size:9px;text-anchor:end}
.info-label{fill:#444}
.info-val{fill:#888}
#pipeline-wrap .info-row{fill:#666;font-size:9px}

@keyframes pulse{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes popIn{0%{transform:scale(1)}50%{transform:scale(1.15)}100%{transform:scale(1)}}
.pnode-rect.active .pn-icon{animation:pulse .8s infinite}
.pnode-rect.done .pn-bg{animation:popIn .35s ease-out}
.pnode-rect.error .pn-bg{animation:popIn .35s ease-out}
</style>
</head>
<body>
<div id="sidebar">
  <h2>Sessions</h2>
  <div id="slist"></div>
  <div id="side-btns">
    <button onclick="newSession()">+ New Session</button>
  </div>
</div>
<div id="main">
  <div id="msgs"><div class="empty-state">Select or create a session to start chatting</div></div>
  <div id="pipeline-wrap"><svg id="pipeline-svg"></svg></div>
  <div id="input-box">
    <div id="input-wrap">
      <textarea id="input" placeholder="Type a message or / for commands..." rows="1" autofocus disabled></textarea>
      <div id="slash-pick"></div>
    </div>
    <button id="send" onclick="send()" disabled>Send</button>
  </div>
</div>

<script>
let sid = null, es = null, running = false, streamEl = null;
let sessions = [], planDef = null, planExecuting = false, activePopupStep = null, activePopupBody = null;

// ── Session list ──
async function loadSessions() {
  const res = await fetch('/sessions');
  sessions = await res.json();
  renderSessions();
  if (sessions.length === 0) {
    await newSession();
  } else if (!sid) {
    selectSession(sessions[0].id);
  }
}

function renderSessions() {
  const sl = document.getElementById('slist');
  sl.innerHTML = '';
  if (sessions.length === 0) {
    sl.innerHTML = '<div class="empty-state">No sessions yet</div>';
    return;
  }
  sessions.sort((a,b) => new Date(b.updatedAt) - new Date(a.updatedAt));
  sessions.forEach(s => {
    const el = document.createElement('div');
    el.className = 'sitem' + (s.id === sid ? ' active' : '');
    el.innerHTML = `<div class="info">
      <div class="title">${esc(s.title || 'Untitled')}</div>
      <div class="meta">${s.msgCount||0} msgs · ${fmtTime(s.updatedAt)}</div>
    </div>
    <button class="del" title="Delete session">&times;</button>`;
    el.querySelector('.info').onclick = () => selectSession(s.id);
    el.querySelector('.title').ondblclick = (e) => { e.stopPropagation(); editTitle(s.id, el.querySelector('.title')); };
    el.querySelector('.del').onclick = (e) => { e.stopPropagation(); deleteSession(s.id); };
    sl.appendChild(el);
  });
}

async function newSession() {
  const res = await fetch('/sessions', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title: ''})
  });
  const info = await res.json();
  sessions.push(info);
  renderSessions();
  selectSession(info.id);
}

async function selectSession(id) {
  if (sid === id) return;
  // Disconnect old EventSource.
  if (es) { es.close(); es = null; }
  sid = id;
  // Clear messages.
  document.getElementById('msgs').innerHTML = '';
  running = false; streamEl = null;
  document.getElementById('send').disabled = false;
  document.getElementById('input').disabled = false;
  document.getElementById('input').focus();
  renderSessions();
  connect();
}

async function deleteSession(id) {
  if (!confirm('Delete this session? All messages will be lost.')) return;
  await fetch('/sessions?id=' + encodeURIComponent(id), {method: 'DELETE'});
  sessions = sessions.filter(s => s.id !== id);
  if (sid === id) {
    sid = null; es?.close(); es = null;
    document.getElementById('msgs').innerHTML = '<div class="empty-state">Select or create a session to start chatting</div>';
    document.getElementById('send').disabled = true;
    document.getElementById('input').disabled = true;
    running = false; streamEl = null;
  }
  renderSessions();
}

async function editTitle(id, titleEl) {
  const orig = titleEl.textContent;
  const inp = document.createElement('input');
  inp.value = orig === 'Untitled' ? '' : orig;
  inp.style.cssText = 'background:#222;border:1px solid #1a56db;color:#ddd;padding:2px 6px;border-radius:4px;font-size:13px;width:100%';
  titleEl.replaceWith(inp);
  inp.focus(); inp.select();
  inp.onblur = () => saveTitle(id, inp.value || 'Untitled', inp);
  inp.onkeydown = e => { if (e.key === 'Enter') saveTitle(id, inp.value || 'Untitled', inp); };
}

async function saveTitle(id, title, inp) {
  const el = document.createElement('div');
  el.className = 'title';
  el.textContent = title || 'Untitled';
  el.ondblclick = (e) => { e.stopPropagation(); editTitle(id, el); };
  inp.replaceWith(el);
  await fetch('/sessions?id=' + encodeURIComponent(id), {
    method: 'PATCH',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({title})
  });
  const s = sessions.find(s => s.id === id);
  if (s) s.title = title;
}

// ── Pipeline panel (SVG flow diagram) ──

var PIPE = [
  {id:'memory.fetch',  icon:'📥', label:'Fetch'},
  {id:'guard.in',      icon:'🔵', label:'In'},
  {id:'prompt.build',  icon:'📋', label:'Prompt'},
  {id:'model.call',    icon:'🧠', label:'Model'},
  {id:'guard.out',     icon:'🔴', label:'Out'},
  {id:'tool.execute',  icon:'🔧', label:'Tool'},
  {id:'memory.append', icon:'📤', label:'Store'},
];
var pipeState = {};
var pipeSVG = null;

function renderPipeline() {
  var svg = document.getElementById('pipeline-svg');
  if (!svg) return;
  var W = svg.clientWidth || 900;
  var H = 86, n = PIPE.length, pad = 42, gap = (W - pad*2) / (n - 1);
  var cy = 34, nodeW = 80, nodeH = 36;

  var html = '<defs>' +
    '<filter id="glow"><feGaussianBlur stdDeviation="3" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
    '<filter id="particle-glow"><feGaussianBlur stdDeviation="1.5" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>' +
    '</defs>';

  // Connectors with flow animation
  for (var i = 0; i < n - 1; i++) {
    var x1 = pad + i*gap + nodeW/2, x2 = pad + (i+1)*gap - nodeW/2;
    var mid = (x1 + x2) / 2;
    var d = 'M' + x1 + ',' + cy + ' C' + mid + ',' + cy + ' ' + mid + ',' + cy + ' ' + x2 + ',' + cy;
    var s1 = pipeState[PIPE[i].id], s2 = pipeState[PIPE[i+1].id];
    var flowing = s1 && s1.phase === 'leave' && !s1.error && s2 && s2.phase !== 'leave';

    // Base connector
    html += '<path class="pconn' + (flowing ? ' flow' : '') + '" d="' + d + '"/>';

    // Animated particle on flowing connectors
    if (flowing) {
      html += '<circle r="3" fill="#60a5fa" filter="url(#particle-glow)"><animateMotion dur="0.6s" repeatCount="indefinite" path="' + d + '"/></circle>';
    }
  }

  // Nodes
  for (var i = 0; i < n; i++) {
    var x = pad + i*gap - nodeW/2, y = cy - nodeH/2;
    var st = pipeState[PIPE[i].id];
    var status = st ? (st.error ? 'error' : (st.phase === 'leave' ? 'done' : 'active')) : 'pending';
    var dur = '', sub = '';
    if (st && st.duration_ms) dur = st.duration_ms < 1000 ? st.duration_ms + 'ms' : (st.duration_ms/1000).toFixed(1)+'s';
    else if (st && st.error) { dur = '✗'; sub = (st.error||'').substring(0, 24); }
    // Show tool name under Tool node
    if (st && st.detail && st.detail.tool && PIPE[i].id === 'tool.execute') {
      sub = (st.detail.tool||'').substring(0, 18);
    }

    html += '<g id="pn-' + PIPE[i].id + '" class="pnode-rect ' + status + '">';
    html += '<rect class="pn-bg" x="' + x + '" y="' + y + '" width="' + nodeW + '" height="' + nodeH + '" rx="10" fill="#14141e" stroke="#252530" stroke-width="1"/>';
    html += '<text class="pn-icon" x="' + (x+14) + '" y="' + (cy+5) + '">' + PIPE[i].icon + '</text>';
    html += '<text class="pn-label" x="' + (x+34) + '" y="' + (cy-3) + '">' + PIPE[i].label + '</text>';
    html += '<text class="pn-dur" x="' + (x+34) + '" y="' + (cy+12) + '">' + dur + '</text>';
    if (sub) html += '<text class="pn-dur" x="' + (x+nodeW/2) + '" y="' + (cy+nodeH-2) + '" text-anchor="middle" font-size="7" fill="#555">' + sub + '</text>';
    html += '</g>';
  }

  // Info bar (bottom)
  var mc = pipeState['model.call'];
  if (mc && mc.detail) {
    var t = mc.detail, parts = [];
    if (t.turn) parts.push('Round '+t.turn+'/'+t.maxTurns);
    if (t.tokens_prompt) parts.push('Tokens ↑'+t.tokens_prompt+' ↓'+t.tokens_completion);
    html += '<text class="pinfo-text" x="' + (W-14) + '" y="' + (H-10) + '">' + parts.join('  ·  ') + '</text>';
  }

  svg.innerHTML = html;
}

function updatePipeline(evt) {
  var wrap = document.getElementById('pipeline-wrap');
  if (!wrap) return;
  if (!evt) { wrap.classList.remove('show'); pipeState = {}; pipeSVG = null; return; }

  // New turn: reset downstream stages. prompt.build already fired for this
  // turn (it runs before model.call), so its "done" state is correct. Only
  // clear model.call itself and everything after it.
  if (evt.name === 'model.call' && evt.phase === 'enter') {
    var downstream = ['model.call','guard.out','tool.execute','memory.append'];
    for (var i = 0; i < downstream.length; i++) delete pipeState[downstream[i]];
  }

  pipeState[evt.name] = evt;
  if (!pipeSVG) { wrap.classList.add('show'); pipeSVG = true; }
  renderPipeline();
}

// Redraw on resize
window.addEventListener('resize', function() { if (pipeSVG) renderPipeline(); });

// ── EventSource ──
function connect() {
  if (!sid) return;
  streamEl = null;
  es = new EventSource('/events?session=' + sid);
  es.onmessage = e => {
    const msg = JSON.parse(e.data);
    switch (msg.type) {
      case 'user_message':
        append('user', msg.text);
        streamEl = null;
        scrollDown();
        break;
      case 'message':
        // Replayed assistant message from history.
        append('agent', msg.text);
        streamEl = null;
        scrollDown();
        break;
      case 'delta':
        if (!streamEl) { streamEl = append('agent', ''); }
        streamEl.textContent += msg.text;
        scrollDown();
        break;
      case 'tool_call':
        if (msg.tool_call) append('tool', '🔧 ' + msg.tool_call.function.name);
        break;
      case 'tool_result':
        append('agent', '  ← ' + msg.text);
        break;
      case 'tool_approval':
        streamEl = null;
        if (msg.tool_call) showApproval(msg.tool_call);
        break;
      case 'tool_approval_cancelled':
        dismissApproval();
        break;
      case 'done':
        streamEl = null; running = false;
        document.getElementById('send').disabled = false;
        break;
      case 'error':
        append('agent', 'Error: ' + (msg.error || msg.text));
        streamEl = null; running = false;
        document.getElementById('send').disabled = false;
        updatePipeline(null);
        break;
      case 'stage':
        if (msg.stage) updatePipeline(typeof msg.stage === 'string' ? JSON.parse(msg.stage) : msg.stage);
        break;
      case 'session_deleted':
        sessions = sessions.filter(s => s.id !== sid);
        sid = null; es?.close(); es = null;
        document.getElementById('msgs').innerHTML = '<div class="empty-state">This session was deleted</div>';
        document.getElementById('send').disabled = true;
        document.getElementById('input').disabled = true;
        running = false; streamEl = null; planDef = null;
        renderSessions();
        return;

      // Plan events (/plan command)
      case 'plan_restore':
        // Restore persisted plan (survived server restart).
        if (msg.plan_def) {
          try { planDef = typeof msg.plan_def === 'string' ? JSON.parse(msg.plan_def) : msg.plan_def; } catch(e) {}
          // Restore step statuses if present.
          if (msg.text) {
            try {
              var results = JSON.parse(msg.text);
              for (var sid in results) {
                var s = planDef.steps.find(function(s2) { return s2.id === sid; });
                if (s) { s._status = results[sid].status; s._result = {summary: results[sid].summary||'', error: results[sid].error||''}; s._output = results[sid].final_output||''; }
              }
            } catch(e) {}
          }
          renderPlanDAG();
        }
        break;
      case 'plan_planning':
        // Show a placeholder that will be replaced by the DAG.
        streamEl = null; running = true;
        document.getElementById('send').disabled = true;
        var pp = document.getElementById('planning-msg');
        if (pp) { pp.textContent = '📋 Generating plan' + (msg.text ? ' for: ' + msg.text : '') + '…'; }
        else { pp = append('agent', '📋 Generating plan' + (msg.text ? ' for: ' + msg.text : '') + '…'); pp.id = 'planning-msg'; pp.style.color = '#8b949e'; pp.style.fontStyle = 'italic'; }
        break;
      case 'plan_generated':
        streamEl = null; running = false;
        // Remove the "Generating plan..." placeholder.
        var pm = document.getElementById('planning-msg');
        if (pm) pm.remove();
        if (msg.plan_def) {
          try { planDef = typeof msg.plan_def === 'string' ? JSON.parse(msg.plan_def) : msg.plan_def; } catch(e) {}
          renderPlanDAG();
        }
        document.getElementById('send').disabled = false;
        break;
      case 'plan_step_start':
        planExecuting = true; streamEl = null;
        updatePlanStep(msg.step_id, 'running');
        renderPlanDAG();
        break;
      case 'plan_step_text':
        {
          const ps = planDef?.steps?.find(s => s.id === msg.step_id);
          if (ps) { ps._output = (ps._output||'') + (msg.text||''); updatePlanCard(msg.step_id); if (activePopupStep === msg.step_id && activePopupBody) { activePopupBody.textContent = ps._output; } }
        }
        break;
      case 'plan_step_tool':
        {
          const ps = planDef?.steps?.find(s => s.id === msg.step_id);
          if (ps && msg.tool_call) {
            var tc = msg.tool_call;
            var line = '\n🔧 ' + (tc.function?.name || 'tool') + '\n';
            try { line += JSON.stringify(JSON.parse(tc.function?.arguments||'{}'), null, 2) + '\n'; } catch(e) { line += (tc.function?.arguments||'') + '\n'; }
            ps._output = (ps._output||'') + line;
            updatePlanCard(msg.step_id);
            if (activePopupStep === msg.step_id && activePopupBody) { activePopupBody.textContent = ps._output; }
          }
        }
        break;
      case 'plan_step_tool_progress':
        {
          const ps = planDef?.steps?.find(s => s.id === msg.step_id);
          if (ps) {
            ps._output = (ps._output||'') + (msg.text||'');
            updatePlanCard(msg.step_id);
            if (activePopupStep === msg.step_id && activePopupBody) { activePopupBody.textContent = ps._output; }
          }
        }
        break;
      case 'plan_step_tool_result':
        {
          const ps = planDef?.steps?.find(s => s.id === msg.step_id);
          if (ps) {
            var res = (msg.text||'').length > 600 ? (msg.text||'').slice(0,600)+'…' : (msg.text||'');
            ps._output = (ps._output||'') + '\n→ ' + res + '\n';
            updatePlanCard(msg.step_id);
            if (activePopupStep === msg.step_id && activePopupBody) { activePopupBody.textContent = ps._output; }
          }
        }
        break;
      case 'plan_step_done':
        updatePlanStep(msg.step_id, 'done', {summary: msg.text||''});
        streamEl = null; renderPlanDAG();
        break;
      case 'plan_step_failed':
        updatePlanStep(msg.step_id, 'failed', {error: msg.error||''});
        streamEl = null; renderPlanDAG();
        break;
      case 'plan_waiting_retry':
        updatePlanStep(msg.step_id, 'failed', {error: msg.error||''});
        streamEl = null; running = false; planExecuting = false;
        document.getElementById('send').disabled = false;
        showRetryActions(msg.step_id);
        break;
      case 'plan_replanning':
        break;
      case 'plan_done':
        streamEl = null; running = false; planExecuting = false;
        document.getElementById('send').disabled = false;
        // Show final output summary below the DAG.
        if (planDef && msg.text) {
          var fout = document.createElement('div');
          fout.className = 'msg agent plan-done-summary';
          fout.textContent = '✅ ' + (msg.text||'').slice(0, 1000);
          fout.style.cssText = 'margin-top:8px;white-space:pre-wrap;word-break:break-word;';
          document.getElementById('msgs').appendChild(fout);
          scrollDown();
        }
        break;
      case 'plan_error':
        streamEl = null; running = false; planExecuting = false;
        document.getElementById('send').disabled = false;
        var pm2 = document.getElementById('planning-msg'); if (pm2) pm2.remove();
        break;
      case 'plan_cancelled':
        streamEl = null; running = false; planExecuting = false;
        document.getElementById('send').disabled = false;
        renderPlanDAG();
        break;
    }
  };
  es.onerror = () => { es.close(); setTimeout(connect, 2000); };
}

function esc(s) { return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

function fmtTime(t) {
  if (!t) return '';
  const d = new Date(t);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff/60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff/3600000) + 'h ago';
  return d.toLocaleDateString();
}

document.getElementById('input').addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    const pick = document.getElementById('slash-pick');
    if (pick.style.display === 'block') {
      const sel = pick.querySelector('.sc-item.sel');
      if (sel) { e.preventDefault(); pickCommand(sel.dataset.cmd); return; }
    }
    e.preventDefault(); send();
  }
  if (e.key === 'ArrowDown' || e.key === 'ArrowUp') {
    const pick = document.getElementById('slash-pick');
    if (pick.style.display !== 'block') return;
    e.preventDefault();
    const items = pick.querySelectorAll('.sc-item');
    const sel = pick.querySelector('.sc-item.sel');
    const idx = sel ? Array.from(items).indexOf(sel) : -1;
    const next = e.key === 'ArrowDown' ? Math.min(idx+1, items.length-1) : Math.max(idx-1, 0);
    items.forEach(it => it.classList.remove('sel'));
    if (items[next]) items[next].classList.add('sel');
  }
  if (e.key === 'Escape') {
    document.getElementById('slash-pick').style.display = 'none';
  }
});

const slashCommands = [
  {cmd: '/plan', icon: '📋', name: 'Plan', desc: 'Decompose a goal into a DAG and execute'},
];

document.getElementById('input').addEventListener('input', function() {
  const val = this.value;
  const pick = document.getElementById('slash-pick');

  const slashIdx = val.lastIndexOf('/');
  if (slashIdx >= 0 && (slashIdx === 0 || val[slashIdx-1] === ' ' || val[slashIdx-1] === '\n')) {
    const query = val.slice(slashIdx+1).toLowerCase();
    const matches = slashCommands.filter(c => c.cmd.toLowerCase().startsWith('/' + query));
    if (matches.length > 0) {
      let html = '';
      matches.forEach(c => {
        html += '<div class="sc-item" data-cmd="' + c.cmd + '" onclick="pickCommand(\'' + c.cmd + '\')">';
        html += '<span class="sc-icon">' + c.icon + '</span>';
        html += '<span class="sc-name">' + c.cmd + '</span>';
        html += '<span class="sc-desc">' + c.desc + '</span></div>';
      });
      pick.innerHTML = html;
      pick.style.display = 'block';
      // Select first by default.
      const first = pick.querySelector('.sc-item');
      if (first) first.classList.add('sel');
      return;
    }
  }
  pick.style.display = 'none';
});

// Plan DAG rendering — uses DOM API, no innerHTML strings.
function renderPlanDAG() {
  var oldDag = document.querySelector('.plan-dag');
  if (oldDag) oldDag.remove();
  if (!planDef || !planDef.steps) return;

  var colsEdges = layoutPlanDAG(planDef.steps);
  var cols = colsEdges.cols, edges = colsEdges.edges;

  var div = document.createElement('div');
  div.className = 'msg plan-dag';

  var title = document.createElement('div');
  title.className = 'plan-dag-title';
  title.textContent = planDef.goal || 'Plan';
  div.appendChild(title);

  var graph = document.createElement('div');
  graph.className = 'dag-graph';
  var svg = document.createElementNS('http://www.w3.org/2000/svg', 'svg');
  svg.classList.add('dag-svg');
  graph.appendChild(svg);

  var columns = document.createElement('div');
  columns.className = 'dag-columns';

  for (var ci = 0; ci < cols.length; ci++) {
    var col = document.createElement('div');
    col.className = 'dag-col';
    for (var j = 0; j < cols[ci].length; j++) {
      var sid = cols[ci][j];
      var s = planDef.steps.find(function(s2) { return s2.id === sid; });
      if (!s) continue;
      var st = s._status || 'pending';
      var card = document.createElement('div');
      card.className = 'step-card ' + st;
      card.id = 'sc-' + sid;
      card.title = 'Click to view output';
      card.style.cursor = 'pointer';
      (function(stepId) { card.addEventListener('click', function() { showStepPopup(stepId); }); })(sid);

      if (s.final) {
        var f = document.createElement('div'); f.className = 'si-final';
        f.textContent = 'FINAL'; card.appendChild(f);
      }
      var cid = document.createElement('div'); cid.className = 'si-id';
      cid.textContent = s.id; card.appendChild(cid);
      var cag = document.createElement('div'); cag.className = 'si-agent';
      cag.textContent = s.agent; card.appendChild(cag);
      var ct = document.createElement('div'); ct.className = 'si-task';
      ct.textContent = (s.task||'').slice(0, 60); card.appendChild(ct);
      // Show dependencies if any.
      if (s.depends_on && s.depends_on.length > 0) {
        var cd = document.createElement('div'); cd.className = 'si-deps';
        cd.textContent = '← ' + s.depends_on.join(', ');
        card.appendChild(cd);
      }
      var cs = document.createElement('span'); cs.className = 'si-status ' + st;
      cs.textContent = st.charAt(0).toUpperCase() + st.slice(1); card.appendChild(cs);

      col.appendChild(card);
    }
    columns.appendChild(col);
  }
  graph.appendChild(columns);
  div.appendChild(graph);

  var actions = document.createElement('div');
  actions.className = 'plan-actions';
  if (planExecuting) {
    var cb = document.createElement('button'); cb.className = 'btn-pc';
    cb.textContent = 'Cancel'; cb.onclick = cancelPlan;
    actions.appendChild(cb);
  } else if (!running) {
    var eb = document.createElement('button'); eb.className = 'btn-pe';
    eb.textContent = '▶ Execute'; eb.onclick = executePlan;
    actions.appendChild(eb);

    var edb = document.createElement('button'); edb.className = 'btn-pc';
    edb.textContent = '✏️ Edit'; edb.onclick = editPlan;
    actions.appendChild(edb);

    var rb = document.createElement('button'); rb.className = 'btn-pc';
    rb.textContent = '🔄 Replan'; rb.onclick = function() { showReplanInputPre(); };
    actions.appendChild(rb);

    var xb = document.createElement('button'); xb.className = 'btn-pc';
    xb.textContent = '✕ Cancel'; xb.onclick = cancelPlanPreExec;
    actions.appendChild(xb);
  }
  div.appendChild(actions);

  document.getElementById('msgs').appendChild(div);
  requestAnimationFrame(function() { drawPlanEdges(edges); });
  // Scroll to top of DAG, not bottom — otherwise only the last row is visible.
  div.scrollIntoView({block: 'start', behavior: 'instant'});
}

function layoutPlanDAG(steps) {
  const ids = steps.map(s => s.id);
  const depsOf = {}, children = {};
  for (const s of steps) {
    depsOf[s.id] = (s.depends_on || []).filter(d => ids.includes(d));
    children[s.id] = [];
  }
  for (const s of steps) for (const d of depsOf[s.id]) if (children[d]) children[d].push(s.id);
  const inDegree = {}; for (const s of steps) inDegree[s.id] = depsOf[s.id].length;
  const queue = []; for (const s of steps) if (inDegree[s.id] === 0) queue.push(s.id);
  const topo = [];
  while (queue.length) { const id = queue.shift(); topo.push(id); for (const c of (children[id]||[])) if (--inDegree[c] === 0) queue.push(c); }
  const depth = {};
  for (const id of topo) { let m = 0; for (const d of depsOf[id]) m = Math.max(m, (depth[d]||0)+1); depth[id] = m; }
  const cols = []; for (const id of topo) { const d = depth[id]; if (!cols[d]) cols[d] = []; cols[d].push(id); }
  const edges = []; for (const s of steps) for (const d of depsOf[s.id]) edges.push({from:d, to:s.id});
  return {cols, edges};
}

var lastPlanEdges = [];
function drawPlanEdges(edges) {
  lastPlanEdges = edges || [];
  const svg = document.querySelector('.dag-svg');
  const graph = document.querySelector('.dag-graph');
  if (!svg || !graph) return;
  const r = graph.getBoundingClientRect();
  svg.setAttribute('viewBox', '0 0 ' + r.width + ' ' + r.height);
  svg.style.width = r.width + 'px'; svg.style.height = r.height + 'px';
  let h = '';
  for (const {from, to} of lastPlanEdges) {
    const fc = document.getElementById('sc-' + from), tc = document.getElementById('sc-' + to);
    if (!fc || !tc) continue;
    const fr = fc.getBoundingClientRect(), tr = tc.getBoundingClientRect();
    const x1 = fr.right - r.left, y1 = fr.top + fr.height/2 - r.top;
    const x2 = tr.left - r.left, y2 = tr.top + tr.height/2 - r.top;
    const mx = (x1+x2)/2;
    h += '<path d="M'+x1+','+y1+' C'+mx+','+y1+' '+mx+','+y2+' '+x2+','+y2+'"/>';
    h += '<polygon points="'+(x2-4)+','+(y2-2)+' '+x2+','+y2+' '+(x2-4)+','+(y2+2)+'" fill="#58a6ff"/>';
  }
  svg.innerHTML = h;
}
// Redraw edges on resize.
window.addEventListener('resize', function() { if (lastPlanEdges.length > 0) drawPlanEdges(lastPlanEdges); });

function updatePlanCard(id) {
  const card = document.getElementById('sc-' + id);
  if (!card) return;
  const s = planDef.steps.find(s2 => s2.id === id);

  const st = s._status || 'pending';
  card.className = 'step-card ' + st;
  const badge = card.querySelector('.si-status');
  if (badge) { badge.textContent = st.charAt(0).toUpperCase()+st.slice(1); badge.className = 'si-status ' + st; }
  const {edges} = layoutPlanDAG(planDef.steps);
  drawPlanEdges(edges);
}

function showStepPopup(sid) {
  var oldOv = document.querySelector('.step-popup-overlay');
  if (oldOv) oldOv.remove();
  activePopupStep = null; activePopupBody = null;

  var s = planDef.steps.find(function(s2) { return s2.id === sid; });
  if (!s) return;
  var out = s._output || (s._result||{}).summary || '';
  var err = (s._result||{}).error || '';
  var ov = document.createElement('div');
  ov.className = 'step-popup-overlay';
  var hd = document.createElement('div'); hd.className = 'step-popup-hd';
  hd.innerHTML = esc(s.agent) + ' — ' + esc(s.task) + '<span class="step-popup-st">' + (s._status||'pending') + '</span>';
  var xbtn = document.createElement('button'); xbtn.className = 'step-popup-x';
  xbtn.textContent = '✕';
  xbtn.onclick = function() { ov.remove(); activePopupStep = null; activePopupBody = null; };
  hd.appendChild(xbtn);
  var body = document.createElement('div'); body.className = 'step-popup-body';
  body.textContent = out + (err ? '\n\nERROR: ' + err : '') || 'Waiting for output...';
  var box = document.createElement('div'); box.className = 'step-popup';
  box.appendChild(hd); box.appendChild(body);
  ov.appendChild(box);
  ov.onclick = function(e) { if (e.target === ov) { ov.remove(); activePopupStep = null; activePopupBody = null; } };
  document.body.appendChild(ov);
  activePopupStep = sid;

}

function updatePlanStep(id, status, result) {
  const s = planDef.steps.find(s2 => s2.id === id);
  if (s) { s._status = status; if (result) s._result = Object.assign(s._result||{}, result); }
}

function showReplanInputPre() {

  actions.innerHTML = '';
  var inp = document.createElement('input');
  inp.type = 'text'; inp.placeholder = 'Optional: suggestions for the new plan (leave empty to just regenerate)';
  inp.style.cssText = 'flex:1;padding:5px 10px;border-radius:6px;border:1px solid #30363d;background:#0d1117;color:#c9d1d9;font-size:12px;min-width:200px;';
  actions.appendChild(inp);
  var sub = document.createElement('button'); sub.className = 'btn-pe'; sub.textContent = 'Replan';
  sub.onclick = function() { replanBeforeExec(inp.value); };
  actions.appendChild(sub);
  var can = document.createElement('button'); can.className = 'btn-pc'; can.textContent = 'Back';
  can.onclick = function() { renderPlanDAG(); };
  actions.appendChild(can);
  inp.focus();
  inp.addEventListener('keydown', function(e) { if (e.key === 'Enter') replanBeforeExec(inp.value); });
}

async function replanBeforeExec(feedback) {
  var goal = planDef ? planDef.goal : '';
  // Save current plan JSON BEFORE clearing planDef.
  var curPlan = planDef ? JSON.stringify({goal:planDef.goal, steps:planDef.steps.map(function(s){return {id:s.id,agent:s.agent,task:s.task,depends_on:s.depends_on||[],final:s.final||false};})}) : '';
  running = true; document.getElementById('send').disabled = true;
  // Remove old DAG card.
  var oldDag = document.querySelector('.plan-dag'); if (oldDag) oldDag.remove();
  planDef = null;
  // Show placeholder — plan_planning event will update it.
  var pp = document.createElement('div'); pp.id = 'planning-msg'; pp.className = 'msg agent';
  pp.textContent = '📋 Regenerating plan' + (feedback ? ' with feedback: ' + feedback : '') + '…';
  pp.style.cssText = 'color:#8b949e;font-style:italic;';
  document.getElementById('msgs').appendChild(pp);
  scrollDown();
  await fetch('/chat', {method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({session:sid, message:'/plan '+goal, feedback:feedback, current_plan:curPlan})});
}

function cancelPlanPreExec() {
  planDef = null; planExecuting = false;
  var oldDag = document.querySelector('.plan-dag'); if (oldDag) oldDag.remove();
  document.getElementById('send').disabled = false;
}
</script>
</body>
</html>
